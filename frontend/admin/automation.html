<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tự động hóa n8n | TravelWise Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;}</style>
</head><body class="bg-slate-100">
<div id="tw-sidebar"></div>
<div class="ml-64">
  <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-20">
    <h1 class="text-xl font-bold">⚡ Tự động hóa (n8n)</h1>
    <p class="text-xs text-slate-500">Quản lý workflow tự động hóa kết nối với n8n</p>
  </header>
  <main class="p-6 space-y-6">
    <!-- Status Banner -->
    <div class="bg-gradient-to-r from-emerald-600 to-teal-600 rounded-2xl p-5 text-white flex items-center justify-between">
      <div><p class="font-bold text-lg">n8n Workflow Engine</p><p class="text-emerald-100 text-sm">3 workflows đang hoạt động · Kết nối: Hoạt động ✅</p></div>
      <a href="http://localhost:5678" target="_blank" class="bg-white text-emerald-700 font-bold px-4 py-2 rounded-xl text-sm hover:bg-emerald-50 transition">Mở n8n →</a>
    </div>
    <!-- Workflows -->
    <div class="bg-white rounded-2xl border border-slate-200 p-6">
      <h2 class="font-bold mb-4">🔄 Workflows</h2>
      <div class="space-y-3" id="workflows-list"></div>
    </div>
    <!-- Logs -->
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 class="font-bold">📋 Lịch sử thực thi</h2>
        <button onclick="addLog()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold px-3 py-2 rounded-xl transition">▶ Test trigger</button>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr><th class="text-left px-5 py-3 font-semibold text-slate-600">ID</th><th class="text-left px-5 py-3 font-semibold text-slate-600">Sự kiện</th><th class="text-left px-5 py-3 font-semibold text-slate-600">Thời gian</th><th class="text-left px-5 py-3 font-semibold text-slate-600">Kết quả</th></tr>
        </thead>
        <tbody id="log-table"></tbody>
      </table>
    </div>
  </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script>
injectAdminSidebar('automation.html');

const WORKFLOWS = [
  { id: 1, name: 'Cross-sell: Gợi ý khách sạn sau đặt tour', status: true, trigger: 'POST /automation/webhook/booking-tour', runs: 48, last: '10 phút trước' },
  { id: 2, name: 'Upsell: Email nâng cấp phòng', status: true, trigger: 'POST /automation/webhook/booking-hotel', runs: 23, last: '2 giờ trước' },
  { id: 3, name: 'Email xác nhận đặt chỗ', status: true, trigger: 'POST /automation/webhook/booking-confirm', runs: 124, last: '5 phút trước' },
];
let logs = [];

async function loadWorkflows() {
  try {
    const res = await fetch(API_BASE + '/admin/automation/workflows', { headers: authHeaders() });
    const json = await res.json();
    if (json.success) {
      json.data.forEach((w, i) => { if (WORKFLOWS[i]) { WORKFLOWS[i] = { ...WORKFLOWS[i], ...w }; } });
    }
  } catch (e) { /* offline: dùng mock */ }
  renderWorkflows();
}

async function loadLogs() {
  try {
    const res = await fetch(API_BASE + '/admin/automation/logs', { headers: authHeaders() });
    const json = await res.json();
    if (json.success) {
      logs = json.data;
    }
  } catch (e) { /* offline: dùng mock từ components.js */ }
  renderLogs();
}

function renderWorkflows() {
  const el = document.getElementById('workflows-list');
  if (!el) return;
  el.innerHTML = WORKFLOWS.map((w) => `
        <div class="flex items-center gap-4 p-4 border border-slate-200 rounded-xl hover:border-emerald-300 transition">
          <div class="w-3 h-3 rounded-full ${w.status ? 'bg-emerald-500' : 'bg-slate-300'} flex-shrink-0"></div>
          <div class="flex-1 min-w-0">
            <p class="font-medium text-sm text-slate-800">${w.name}</p>
            <p class="text-xs text-slate-400 mt-0.5">Webhook: <code class="bg-slate-100 px-1 rounded text-xs">${API_BASE}${w.trigger}</code></p>
            <p class="text-xs text-slate-400">Đã chạy: ${w.runs} lần · Lần cuối: ${w.last}</p>
          </div>
          <div class="text-right">
            <span class="text-xs font-semibold ${w.status ? 'text-emerald-600' : 'text-slate-400'}">${w.status ? '🟢 Active' : '⚫ Inactive'}</span>
            <a href="http://localhost:5678" target="_blank" class="block text-xs text-blue-500 hover:underline mt-1">⚡ Mở n8n</a>
          </div>
        </div>`).join('');
}

function renderLogs(){
  const allLogs = logs.length > 0 ? logs : DATA.logs;
  document.getElementById('log-table').innerHTML=allLogs.map(l=>`
  <tr class="border-b border-slate-100 hover:bg-slate-50">
    <td class="px-5 py-3 font-mono text-xs text-slate-400">${l.id}</td>
    <td class="px-5 py-3 text-sm text-slate-700">${l.event}</td>
    <td class="px-5 py-3 text-xs text-slate-400">${l.timestamp}</td>
    <td class="px-5 py-3"><span class="text-xs font-semibold px-2.5 py-1 rounded-full ${(l.status==='success'||l.status==='completed')?'bg-emerald-100 text-emerald-700':'bg-red-100 text-red-600'}">${(l.status==='success'||l.status==='completed')?'✅ Thành công':'❌ Lỗi'}</span></td>
  </tr>`).join('');
}

async function addLog(){
  try {
    const res = await fetch(API_BASE + '/admin/automation/logs', {
      method: 'POST',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ event: 'Test trigger thủ công', status: 'success' }),
    });
    const json = await res.json();
    if (json.success) showToast('▶ Đã kích hoạt workflow test!');
  } catch (e) {
    showToast('❌ Lỗi kết nối server', 'error');
    const id='LOG-'+String(DATA.logs.length+1).padStart(3,'0');
    DATA.logs.unshift({id,event:'Test trigger thủ công',timestamp:new Date().toLocaleString('vi-VN'),status:'success'});
  }
  renderLogs();
}

loadWorkflows();
loadLogs();
</script>
</body></html>
