<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quản lý Tour | TravelWise Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;}</style>
<style>
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-error{background:#fee2e2;color:#991b1b}
.badge-primary{background:#dbeafe;color:#1e40af}
</style>
</head>
<body class="bg-slate-100">
<div id="tw-sidebar"></div>
<div class="ml-64">
  <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-20 flex items-center justify-between">
    <div><h1 class="text-xl font-bold">🗺 Quản lý Tour</h1><p class="text-xs text-slate-500">Thêm, sửa, xóa các gói tour</p></div>
    <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition">＋ Thêm tour mới</button>
  </header>
  <main class="p-6">
    <div id="api-banner" class="hidden rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900 mb-4"></div>
    <!-- Stats -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="text-xs text-slate-500 font-medium">Tổng tour</p>
        <p class="text-2xl font-bold text-slate-800 mt-1" id="stat-total">—</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="text-xs text-slate-500 font-medium">Đang hoạt động</p>
        <p class="text-2xl font-bold text-emerald-600 mt-1" id="stat-active">—</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="text-xs text-slate-500 font-medium">Đã bán</p>
        <p class="text-2xl font-bold text-blue-600 mt-1" id="stat-revenue">—</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="text-xs text-slate-500 font-medium">Đánh giá TB</p>
        <p class="text-2xl font-bold text-amber-500 mt-1" id="stat-rating">—</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 p-4 mb-4 flex gap-3">
      <input id="search" placeholder="🔍 Tìm tên tour..." oninput="debounceLoad()" class="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      <select id="location-filter" onchange="loadTours()" class="border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="">📍 Tất cả địa điểm</option>
      </select>
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600 w-12">ID</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Tour</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Địa điểm</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Thời gian</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Giá/người</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Rating</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Trạng thái</th>
            <th class="text-right px-5 py-3.5 font-semibold text-slate-600">Thao tác</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
      <div id="loading" class="text-center py-12 text-slate-400 hidden">
        <svg class="animate-spin h-8 w-8 mx-auto text-blue-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
        <p class="mt-2 text-sm">Đang tải dữ liệu...</p>
      </div>
      <div id="empty" class="text-center py-12 text-slate-400 hidden">
        <p class="text-lg">📭 Không tìm thấy tour nào</p>
        <p class="text-xs mt-1">Thử thay đổi bộ lọc hoặc thêm tour mới</p>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6">
    <div class="flex items-center justify-between mb-5">
      <h2 class="font-bold text-lg" id="modal-title">＋ Thêm tour mới</h2>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">×</button>
    </div>
    <form id="tour-form" onsubmit="saveTour(event)" class="space-y-3">
      <input type="hidden" id="edit-id"/>
      <div><label class="text-xs font-semibold text-slate-500 block mb-1">Tên tour *</label>
        <input id="f-title" required class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-slate-500 block mb-1">Địa điểm *</label>
          <select id="f-loc" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          </select></div>
        <div><label class="text-xs font-semibold text-slate-500 block mb-1">Thời gian</label>
          <input id="f-dur" placeholder="VD: 5 NGÀY" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-slate-500 block mb-1">Giá/người (VND) *</label>
          <input id="f-price" type="number" required min="1000" step="1000" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/></div>
        <div><label class="text-xs font-semibold text-slate-500 block mb-1">Giảm giá (%)</label>
          <input id="f-disc" type="number" min="0" max="100" placeholder="0" value="0" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs font-semibold text-slate-500 block mb-1">Badge</label>
          <select id="f-badge" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="">Không có</option><option>BEST SELLER</option><option>FEATURED</option><option>POPULAR</option><option>LUXURY</option>
          </select></div>
        <div><label class="text-xs font-semibold text-slate-500 block mb-1">Trạng thái</label>
          <select id="f-status" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="active">🟢 Hoạt động</option><option value="inactive">🔴 Tạm ngưng</option>
          </select></div>
      </div>
      <div><label class="text-xs font-semibold text-slate-500 block mb-1">URL ảnh</label>
        <input id="f-img" type="url" placeholder="https://..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/></div>
      <div><label class="text-xs font-semibold text-slate-500 block mb-1">Bao gồm</label>
        <input id="f-inc" placeholder="Hotels, Meals, Guide" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/></div>
      <div><label class="text-xs font-semibold text-slate-500 block mb-1">Mô tả</label>
        <textarea id="f-desc" rows="2" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea></div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 py-2.5 text-sm bg-slate-100 hover:bg-slate-200 rounded-xl transition">Hủy</button>
        <button type="submit" id="btn-save" class="flex-1 py-2.5 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold transition">Lưu</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script>
injectAdminSidebar('tours.html');


function showApiBanner(msg) {
  const el = document.getElementById('api-banner');
  if (!el) return;
  if (!msg) { el.classList.add('hidden'); el.textContent = ''; return; }
  el.classList.remove('hidden');
  el.textContent = msg;
}
function fmtVND(p) {
  if (isNaN(p) || p == null) return '0₫';
  return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 }).format(p);
}
let allTours = [];
let allDestinations = [];

function showPageLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
  document.getElementById('empty').classList.toggle('hidden', true);
}

function showEmpty() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('empty').classList.remove('hidden');
  document.getElementById('table').innerHTML = '';
}

async function loadDestinations() {
  try {
    const res = await Destinations.list({ status: 'active' });
    if (res.success) {
      allDestinations = res.data || [];
      populateLocationDropdowns();
    }
  } catch (e) { /* silent fail */ }
}

function populateLocationDropdowns() {
  const filterSel = document.getElementById('location-filter');
  const formSel = document.getElementById('f-loc');
  const currentFilter = filterSel.value;
  const currentForm = formSel.value;

  filterSel.innerHTML = '<option value="">📍 Tất cả địa điểm</option>' +
    allDestinations.map(d => `<option value="${d.name}">📍 ${d.name}</option>`).join('');
  filterSel.value = currentFilter;

  formSel.innerHTML = allDestinations.map(d => `<option value="${d.name}">📍 ${d.name}</option>`).join('');
  formSel.value = currentForm;
}

let debounceTimer;
function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadTours, 300);
}

async function loadTours() {
  showPageLoading(true);
  showApiBanner('');
  try {
    const search = document.getElementById('search').value.trim();
    const location = document.getElementById('location-filter').value;
    const params = {};
    if (search) params.search = search;
    if (location) params.location = location;

    const res = await Tours.adminList(params);
    if (res.success) {
      allTours = extractApiList(res);
      if (allTours.length === 0) {
        showApiBanner('Không có tour nào. Đảm bảo đã chạy: php artisan migrate --seed');
      }
      renderStats();
      renderTable();
    } else {
      showApiBanner('Lỗi tải dữ liệu: ' + (res.message || ''));
      toast('Lỗi tải dữ liệu', 'error');
    }
  } catch (err) {
    const is401 = err && (err.status === 401 || String(err.message || '').toLowerCase().includes('unauthenticated'));
    showApiBanner(is401
      ? 'Phiên đăng nhập hết hạn. Đăng nhập lại admin.'
      : 'Không thể kết nối server. Bật backend: cd be → php artisan serve');
    toast('Không thể kết nối server', 'error');
    allTours = [];
  } finally {
    showPageLoading(false);
  }
}

function renderStats() {
  document.getElementById('stat-total').textContent = allTours.length;
  const active = allTours.filter(t => t.status === 'active').length;
  document.getElementById('stat-active').textContent = active;
  const reviews = allTours.reduce((sum, t) => sum + (parseInt(t.review_count) || 0), 0);
  document.getElementById('stat-revenue').textContent = reviews;
  const avgRating = allTours.length > 0
    ? (allTours.reduce((sum, t) => sum + (parseFloat(t.rating) || 0), 0) / allTours.length).toFixed(1)
    : '0.0';
  document.getElementById('stat-rating').textContent = avgRating;
}

function renderTable() {
  if (allTours.length === 0) { showEmpty(); return; }
  document.getElementById('empty').classList.add('hidden');

  const html = allTours.map(t => {
    const price = parseFloat(t.price_per_person) || 0;
    const disc = parseFloat(t.discount) || 0;
    const finalPrice = price * (1 - disc / 100);
    const statusBadge = t.status === 'active'
      ? '<span class="badge badge-success">🟢 Hoạt động</span>'
      : '<span class="badge badge-error">🔴 Tạm ngưng</span>';
    return `<tr class="border-b border-slate-100 hover:bg-slate-50 group">
      <td class="px-5 py-4 text-xs text-slate-400">#${t.id}</td>
      <td class="px-5 py-4"><div class="flex items-center gap-3">
        <img src="${t.image_url || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=400'}" class="w-12 h-10 rounded-lg object-cover" onerror="this.src='https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=400'"/>
        <div>
          <span class="font-medium text-sm leading-tight max-w-[160px] truncate block">${t.title}</span>
          ${t.badge ? `<span class="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-semibold">${t.badge}</span>` : ''}
        </div>
      </div></td>
      <td class="px-5 py-4 text-sm text-slate-500">📍 ${t.location}</td>
      <td class="px-5 py-4 text-xs text-slate-500">${t.duration || '—'}</td>
      <td class="px-5 py-4 font-semibold text-blue-600">${fmtVND(Math.round(finalPrice))}${disc ? `<span class="text-xs text-slate-400 ml-1">(-${disc}%)</span>` : ''}</td>
      <td class="px-5 py-4"><span class="bg-emerald-500 text-white text-xs font-bold px-2 py-0.5 rounded">⭐ ${parseFloat(t.rating || 0).toFixed(1)}</span></td>
      <td class="px-5 py-4">${statusBadge}</td>
      <td class="px-5 py-4 text-right">
        <div class="flex items-center justify-end gap-2">
        <button onclick="editTour(${t.id})" class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs font-semibold px-3 py-1.5 rounded-lg transition">✏️ Sửa</button>
        <button onclick="deleteTour(${t.id})" class="bg-red-50 hover:bg-red-100 text-red-500 text-xs font-semibold px-3 py-1.5 rounded-lg transition">🗑</button>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('table').innerHTML = html;
}

function openModal(id=null) {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('tour-form').reset();
  document.getElementById('edit-id').value = '';
  document.getElementById('modal-title').textContent = '＋ Thêm tour mới';
  document.getElementById('f-disc').value = '0';
  populateLocationDropdowns();
}

function editTour(id) {
  const t = allTours.find(x => x.id == id);
  if (!t) return;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-title').textContent = '✏️ Chỉnh sửa tour';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-title').value = t.title || '';
  document.getElementById('f-loc').value = t.location || 'Việt Nam';
  document.getElementById('f-dur').value = t.duration || '';
  document.getElementById('f-price').value = t.price_per_person || '';
  document.getElementById('f-disc').value = t.discount || 0;
  document.getElementById('f-badge').value = t.badge || '';
  document.getElementById('f-status').value = t.status || 'active';
  document.getElementById('f-img').value = t.image_url || '';
  document.getElementById('f-inc').value = t.includes || '';
  document.getElementById('f-desc').value = t.description || '';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

async function saveTour(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-save');
  showLoading(btn, true);

  const id = parseInt(document.getElementById('edit-id').value);
  const locName = document.getElementById('f-loc').value;
  const dest = allDestinations.find(d => d.name === locName);

  const payload = {
    title: document.getElementById('f-title').value,
    location: locName,
    destination_id: dest ? dest.id : null,
    duration: document.getElementById('f-dur').value,
    price_per_person: parseFloat(document.getElementById('f-price').value),
    discount: parseInt(document.getElementById('f-disc').value) || 0,
    badge: document.getElementById('f-badge').value || null,
    status: document.getElementById('f-status').value,
    image_url: document.getElementById('f-img').value || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200',
    includes: document.getElementById('f-inc').value,
    description: document.getElementById('f-desc').value,
    rating: 9.0,
    review_count: 0,
  };

  try {
    let res;
    if (id) {
      res = await Tours.adminUpdate(id, payload);
    } else {
      res = await Tours.adminCreate(payload);
    }

    if (res.success) {
      toast(id ? '✅ Cập nhật tour thành công!' : '✅ Thêm tour thành công!');
      closeModal();
      loadTours();
    } else {
      toast(res.message || 'Có lỗi xảy ra', 'error');
    }
  } catch (err) {
    console.error('[Admin] Save error:', err);
    toast(err.message || 'Không thể lưu. Kiểm tra kết nối server.', 'error');
  } finally {
    showLoading(btn, false);
  }
}

async function deleteTour(id) {
  if (!confirm('Xóa tour này? Hành động này không thể hoàn tác.')) return;
  try {
    const res = await Tours.adminDelete(id);
    if (res.success) {
      toast('🗑️ Đã xóa tour!');
      loadDestinations();
      loadTours();
    } else {
      toast(res.message || 'Xóa thất bại', 'error');
    }
  } catch (err) {
    toast('Không thể kết nối server', 'error');
  }
}

if (requireAdmin()) {
  loadDestinations();
  loadTours();
}
</script>
</body></html>
