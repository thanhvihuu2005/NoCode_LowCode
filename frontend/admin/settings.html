<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cài đặt hệ thống | TravelWise Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"] } } },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100">
    <div id="tw-sidebar"></div>
    <div class="ml-64">
      <header
        class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-20"
      >
        <h1 class="text-xl font-bold">⚙️ Cài đặt hệ thống</h1>
        <p class="text-xs text-slate-500">
          Cấu hình thông tin website và tích hợp
        </p>
      </header>
      <main class="p-6 space-y-6 max-w-2xl">
        <!-- General -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6">
          <h2 class="font-bold mb-4">🌐 Thông tin website</h2>
          <div class="space-y-3">
            <div>
              <label class="text-xs font-semibold text-slate-500 block mb-1"
                >Tên website</label
              ><input
                value="TravelWise"
                class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
              />
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-500 block mb-1"
                >Email hỗ trợ</label
              ><input
                type="email"
                value="support@travelwise.com"
                class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
              />
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-500 block mb-1"
                >Hotline</label
              ><input
                value="1800 1234"
                class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
              />
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-500 block mb-1"
                >Địa chỉ</label
              ><input
                value="VKU "
                class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
              />
            </div>
            <button
              onclick="showToast('✅ Đã lưu cài đặt!')"
              class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition"
            >
              Lưu thay đổi
            </button>
          </div>
        </div>
        <!-- Integrations -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6">
          <h2 class="font-bold mb-4">🔗 Tích hợp</h2>
          <div class="space-y-3" id="integrations-list"></div>
        </div>
        <!-- Notifications -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6">
          <h2 class="font-bold mb-4">🔔 Thông báo</h2>
          <div class="space-y-3" id="notifications-list"></div>
          <button
            onclick="showToast('✅ Đã lưu cài đặt thông báo!')"
            class="mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition"
          >
            Lưu cài đặt
          </button>
        </div>
      </main>
    </div>
    <script src="../js/components.js"></script>
    <script>
      injectAdminSidebar("settings.html");
      if (!requireAdmin()) {}
      else {
      (function () {
        const integrations = [
          {
            icon: "⚡",
            name: "n8n Workflow",
            desc: "Kết nối tự động hóa",
            url: "http://localhost:5678",
            status: "Kết nối",
          },
          {
            icon: "🗄️",
            name: "PostgreSQL",
            desc: "Database chính",
            url: "localhost:5432/travelwise",
            status: "Hoạt động",
          },
          {
            icon: "🔴",
            name: "Redis Cache",
            desc: "Bộ nhớ đệm",
            url: "localhost:6379",
            status: "Offline",
          },
        ];
        const intEl = document.getElementById("integrations-list");
        if (intEl) {
          intEl.innerHTML = integrations
            .map((i) => {
              const offline = i.status === "Offline";
              const badgeClass = offline
                ? "bg-red-100 text-red-600"
                : "bg-emerald-100 text-emerald-700";
              const badgeIcon = offline ? "🔴" : "🟢";
              return `<div class="flex items-center gap-4 p-4 border border-slate-200 rounded-xl">
          <div class="text-2xl w-10 text-center">${i.icon}</div>
          <div class="flex-1"><p class="font-semibold text-sm text-slate-800">${i.name}</p><p class="text-xs text-slate-400">${i.desc} · <code class="bg-slate-100 px-1 rounded">${i.url}</code></p></div>
          <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${badgeClass}">${badgeIcon} ${i.status}</span>
        </div>`;
            })
            .join("");
        }
        const notifies = [
          ["Email xác nhận đặt chỗ", true],
          ["Email gợi ý dịch vụ", true],
          ["SMS nhắc nhở chuyến đi", false],
          ["Push notification", false],
        ];
        const notEl = document.getElementById("notifications-list");
        if (notEl) {
          notEl.innerHTML = notifies
            .map(
              ([label, checked]) => `
        <label class="flex items-center justify-between cursor-pointer">
          <span class="text-sm text-slate-700">${label}</span>
          <div class="relative"><input type="checkbox" ${checked ? "checked" : ""} class="sr-only peer"/><div class="w-11 h-6 bg-slate-200 peer-checked:bg-emerald-500 rounded-full transition cursor-pointer after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-5 after:w-5 after:transition peer-checked:after:translate-x-5"></div></div>
        </label>`,
            )
            .join("");
        }
      })();
      }
    </script>
  </body>
</html>
