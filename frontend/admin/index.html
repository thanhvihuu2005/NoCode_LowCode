<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | TravelWise</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: { 50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' },
        accent: { 50: 'var(--color-accent-50)', 100: 'var(--color-accent-100)', 500: 'var(--color-accent-500)', 600: 'var(--color-accent-600)' },
        app: 'var(--color-bg-app)', surface: 'var(--color-bg-surface)',
        content: { primary: 'var(--color-text-primary)', secondary: 'var(--color-text-secondary)' },
        border: 'var(--color-border)', status: { success: 'var(--color-success)', warning: 'var(--color-warning)', error: 'var(--color-error)' }
      },
      fontFamily: { sans: ['Inter', 'sans-serif'] }
    }
  }
}
</script>
<style>
:root {
  --color-primary-50: #eff6ff; --color-primary-100: #dbeafe; --color-primary-500: #0f62fe; --color-primary-600: #0043ce;
  --color-accent-50: #fffbeb; --color-accent-100: #fef3c7; --color-accent-500: #f59e0b; --color-accent-600: #d97706;
  --color-bg-app: #f8fafc; --color-bg-surface: #ffffff;
  --color-text-primary: #0f172a; --color-text-secondary: #64748b;
  --color-border: #e2e8f0;
  --color-success: #10b981; --color-warning: #f59e0b; --color-error: #ef4444;
}
body{font-family:'Inter',sans-serif;}
.hide-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-app text-content-primary">
<div id="tw-sidebar"></div>
<div class="ml-64">
  <header class="bg-surface border-b border-border px-8 py-5 flex items-center justify-between sticky top-0 z-20 shadow-sm">
    <div>
      <h1 class="text-2xl font-bold tracking-tight text-content-primary">Dashboard Tổng quan</h1>
      <p class="text-sm text-content-secondary mt-1">Hôm nay là <span id="today" class="font-medium"></span></p>
    </div>
    <div id="topbar-user" class="flex items-center gap-3"></div>
  </header>
  <main class="p-8 space-y-8 max-w-7xl">
    <div id="api-banner" class="hidden rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900"></div>
    <!-- Metrics -->
    <div class="grid grid-cols-4 gap-6" id="metrics"></div>

    <!-- Charts row -->
    <div class="grid grid-cols-3 gap-6">
      <div class="col-span-2 bg-surface rounded-2xl border border-border p-6 shadow-sm">
        <div class="flex items-center justify-between mb-6">
           <h2 class="font-bold text-lg text-content-primary">📈 Doanh thu 6 tháng gần nhất</h2>
           <span class="text-xs font-medium bg-app border border-border px-3 py-1 rounded text-content-secondary">Vào lúc này</span>
        </div>
        <div id="chart" class="flex items-end gap-3 h-48"></div>
      </div>
      <div class="bg-surface rounded-2xl border border-border p-6 shadow-sm flex flex-col">
        <h2 class="font-bold text-lg text-content-primary mb-6">🔢 Thống kê hệ thống</h2>
        <div class="space-y-4 flex-1" id="quick-stats"></div>
      </div>
    </div>
    
    <!-- Upsell Insight Card (Admin View) -->
    <div class="bg-accent-50 rounded-2xl border border-accent-100 p-6 flex items-center justify-between mt-6">
      <div>
        <h3 class="font-bold text-lg text-accent-600 flex items-center gap-2">🔥 Cơ hội Upsell & Cross-sell</h3>
        <p class="text-sm text-content-secondary text-accent-600/80 mt-1">Tỷ lệ chuyển đổi giao dịch combo hiển thị trên client hôm nay tăng +15%</p>
      </div>
      <button class="bg-accent-500 hover:bg-accent-600 text-white font-semibold py-2 px-5 rounded-lg transition-colors text-sm shadow-sm">
        Xem báo cáo chi tiết
      </button>
    </div>

    <!-- Recent Bookings -->
    <div class="bg-surface rounded-2xl border border-border overflow-hidden shadow-sm mt-6">
      <div class="px-6 py-5 flex items-center justify-between border-b border-border bg-white">
        <h2 class="font-bold text-lg">📋 Giao dịch đặt chỗ gần đây</h2>
        <a href="bookings.html" class="text-sm text-primary-600 font-medium hover:text-primary-500">Xem tất cả →</a>
      </div>
      <table class="w-full text-sm text-left">
        <thead class="bg-app border-b border-border text-xs uppercase text-content-secondary">
          <tr>
            <th class="px-6 py-4 font-semibold">Mã Đặt</th>
            <th class="px-6 py-4 font-semibold">Khách hàng</th>
            <th class="px-6 py-4 font-semibold">Dịch vụ</th>
            <th class="px-6 py-4 font-semibold">Giá trị (VND)</th>
            <th class="px-6 py-4 font-semibold">Trạng thái</th>
          </tr>
        </thead>
        <tbody id="bk-table" class="divide-y divide-border"></tbody>
      </table>
    </div>
  </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script>
function showApiBanner(msg) {
  const el = document.getElementById('api-banner');
  if (!el) return;
  if (!msg) { el.classList.add('hidden'); el.textContent = ''; return; }
  el.classList.remove('hidden');
  el.textContent = msg;
}

async function loadDashboard() {
  const [bookingsRes, usersRes, hotelsRes, toursRes, promosRes, destinationsRes] = await Promise.allSettled([
    Bookings.adminList(),
    Users.list(),
    Hotels.adminList(),
    Tours.adminList(),
    Promos.list(),
    Destinations.list(),
  ]);

  const settled = [bookingsRes, usersRes, hotelsRes, toursRes, promosRes, destinationsRes];
  const failCount = settled.filter((r) => r.status === 'rejected').length;
  if (failCount > 0) {
    const reason = settled.find((r) => r.status === 'rejected')?.reason;
    const msg401 =
      reason &&
      (reason.status === 401 ||
        String(reason.message || '')
          .toLowerCase()
          .includes('unauthenticated'));
    showApiBanner(
      msg401
        ? 'Phiên đăng nhập hết hạn hoặc không có quyền. Đăng nhập lại tài khoản admin (ví dụ admin@travelwise.vn / admin123).'
        : 'Không tải được dữ liệu từ API. Bật backend: trong thư mục be chạy php artisan serve (http://127.0.0.1:8000) và kiểm tra CORS.',
    );
    if (typeof showToast === 'function') showToast('Lỗi tải dữ liệu dashboard', 'error');
  } else {
    showApiBanner('');
  }

  const bookings = listFromSettled(bookingsRes);
  const users = listFromSettled(usersRes);
  const hotels = listFromSettled(hotelsRes);
  const tours = listFromSettled(toursRes);
  const promos = listFromSettled(promosRes);
  const destinations = listFromSettled(destinationsRes);

  if (
    failCount === 0 &&
    !bookings.length &&
    !users.length &&
    !hotels.length &&
    !tours.length &&
    !destinations.length &&
    !promos.length
  ) {
    showApiBanner(
      'API đã kết nối nhưng database đang trống. Trong thư mục be chạy: php artisan migrate --seed (PostgreSQL phải bật, DB travelwise tồn tại).',
    );
  }

  // ── Metrics ───────────────────────────────────────────────
  const completedBookings = bookings.filter(b => b.status === 'Completed' || b.status === 'Confirmed');
  const totalRevenue = completedBookings.reduce((sum, b) => sum + (parseFloat(b.total_price) || 0), 0);
  const pendingCount = bookings.filter(b => b.status === 'Pending').length;

  const metrics = [
    { icon: '💰', label: 'Tổng doanh thu',  value: formatPrice(totalRevenue),                             change: '',             up: true,  color: 'primary' },
    { icon: '📋', label: 'Tổng đặt chỗ',     value: bookings.length,                                        change: '',             up: true,  color: 'accent'  },
    { icon: '👥', label: 'Khách hàng',        value: users.length,                                          change: '',             up: true,  color: 'blue'    },
    { icon: '⏳', label: 'Chờ xác nhận',      value: pendingCount,                                          change: '',             up: false, color: 'orange'  },
  ];

  document.getElementById('metrics').innerHTML = metrics.map(m => `
<div class="bg-surface rounded-2xl border border-border p-6 shadow-sm">
  <div class="flex items-start justify-between mb-4">
    <div class="w-12 h-12 bg-app border border-border rounded-xl flex items-center justify-center text-2xl">${m.icon}</div>
  </div>
  <p class="text-2xl font-extrabold text-content-primary">${m.value}</p>
  <p class="text-sm text-content-secondary font-medium mt-1">${m.label}</p>
</div>`).join('');

  // ── Revenue Chart (6 months from bookings) ───────────────
  const now = new Date();
  const monthLabels = [];
  const monthRevenue = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    monthLabels.push('T' + (d.getMonth() + 1));
    const label = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const rev = bookings
      .filter(b => b.status === 'Completed' || b.status === 'Confirmed')
      .filter(b => {
        if (!b.created_at) return false;
        return b.created_at.startsWith(label);
      })
      .reduce((sum, b) => sum + (parseFloat(b.total_price) || 0), 0);
    monthRevenue.push(rev);
  }
  const maxRev = Math.max(...monthRevenue, 1);
  document.getElementById('chart').innerHTML = monthLabels.map((m, i) => `
<div class="flex-1 flex flex-col items-center gap-2 group">
  <span class="text-[10px] text-content-secondary font-medium opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap bg-surface border border-border px-2 py-1 rounded shadow-sm relative -top-2">${formatPrice(monthRevenue[i])}</span>
  <div class="w-full max-w-[48px] bg-primary-500 border border-primary-600 rounded-t-lg transition-all hover:bg-primary-600 cursor-pointer shadow-sm relative" style="height:${Math.max(4, Math.round(monthRevenue[i] / maxRev * 130))}px"></div>
  <span class="text-xs font-semibold text-content-secondary">${m}</span>
</div>`).join('');

  // ── Quick Stats ────────────────────────────────────────────
  document.getElementById('quick-stats').innerHTML = [
    { label: 'Khách sạn',  value: hotels.length, icon: '🏨' },
    { label: 'Tours',       value: tours.length,   icon: '🗺' },
    { label: 'Điểm đến',   value: destinations.length, icon: '📍' },
    { label: 'Mã giảm giá',value: promos.length,   icon: '🎟' },
  ].map(s => `
<div class="flex items-center justify-between p-3 bg-app rounded-xl border border-border">
   <div class="flex items-center gap-3">
     <span class="text-lg">${s.icon}</span>
     <span class="text-sm font-medium text-content-secondary">${s.label}</span>
   </div>
   <span class="font-bold text-primary-600 text-base">${s.value}</span>
</div>`).join('');

  // ── Recent Bookings Table ─────────────────────────────────
  const recent = bookings.slice(0, 10);
  document.getElementById('bk-table').innerHTML = recent.length
    ? recent.map(b => {
  const statusBadge = b.status === 'Completed'
    ? '<span class="px-2.5 py-1 text-xs font-semibold rounded-full bg-status-success/10 text-status-success border border-status-success/20">Hoàn thành</span>'
    : b.status === 'Pending'
    ? '<span class="px-2.5 py-1 text-xs font-semibold rounded-full bg-status-warning/10 text-status-warning border border-status-warning/20">Chờ duyệt</span>'
    : b.status === 'Cancelled'
    ? '<span class="px-2.5 py-1 text-xs font-semibold rounded-full bg-status-error/10 text-status-error border border-status-error/20">Đã hủy</span>'
    : '<span class="px-2.5 py-1 text-xs font-semibold rounded-full bg-app text-content-secondary border border-border">' + (b.status || '—') + '</span>';
  return `<tr class="hover:bg-primary-50/30 transition-colors">
  <td class="px-6 py-4 font-mono text-xs text-content-secondary">${b.id || '—'}</td>
  <td class="px-6 py-4 font-medium text-content-primary">${b.user_name || b.guest_name || '—'}</td>
  <td class="px-6 py-4"><span class="block text-content-primary max-w-[200px] truncate">${b.tour_name || b.hotel_name || '—'}</span></td>
  <td class="px-6 py-4 font-semibold text-primary-600">${formatPrice(b.total_price)}</td>
  <td class="px-6 py-4">${statusBadge}</td>
</tr>`;
}).join('')
    : `<tr><td colspan="5" class="px-6 py-8 text-center text-content-secondary text-sm">Chưa có đặt chỗ nào.</td></tr>`;
}

function formatVNDCustom(amount) {
  if (isNaN(amount) || amount === null) return '0₫';
  return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '₫';
}

if (requireAdmin()) {
injectAdminSidebar('index.html');
document.getElementById('today').textContent = new Date().toLocaleDateString('vi-VN', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});
const u = getUser();
document.getElementById('topbar-user').innerHTML = `
<div class="text-right"><p class="text-sm font-semibold text-content-primary">${u?.name||'Admin'}</p><p class="text-xs text-content-secondary">Quản trị viên</p></div>
<div class="w-10 h-10 bg-primary-600 rounded-full flex items-center justify-center text-white text-sm font-bold shadow-sm">${(u?.name||'A').charAt(0).toUpperCase()}</div>`;

loadDashboard();
}
</script>
</body></html>
