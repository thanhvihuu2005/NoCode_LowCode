<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mã giảm giá | TravelWise Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;}</style>
<style>
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-error{background:#fee2e2;color:#991b1b}
</style>
</head><body class="bg-slate-100">
<div id="tw-sidebar"></div>
<div class="ml-64">
  <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-20 flex items-center justify-between">
    <div><h1 class="text-xl font-bold">🏷 Mã giảm giá</h1><p class="text-xs text-slate-500">Tạo, sửa và quản lý mã khuyến mãi</p></div>
    <button onclick="openCreateModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition">＋ Tạo mã mới</button>
  </header>
  <main class="p-6">
    <div id="api-banner" class="hidden rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900 mb-4"></div>
    <!-- Search & Filter -->
    <div class="bg-white rounded-2xl border border-slate-200 p-4 mb-4 flex gap-3 flex-wrap">
      <input id="search" placeholder="🔍 Tìm mã..." oninput="debounceLoad()" class="flex-1 min-w-[200px] border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
      <select id="status" onchange="loadPromos()" class="border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        <option value="">Tất cả trạng thái</option>
        <option value="active">🟢 Hoạt động</option>
        <option value="expired">⏰ Hết hạn</option>
        <option value="inactive">🔴 Tắt</option>
      </select>
    </div>
    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl p-4 border border-slate-200"><p class="text-xs text-slate-500">Tổng mã</p><p class="text-2xl font-bold text-slate-800 mt-1" id="s-total">—</p></div>
      <div class="bg-white rounded-xl p-4 border border-slate-200"><p class="text-xs text-slate-500">🟢 Đang hoạt động</p><p class="text-2xl font-bold text-emerald-600 mt-1" id="s-active">—</p></div>
      <div class="bg-white rounded-xl p-4 border border-slate-200"><p class="text-xs text-slate-500">Lượt đã dùng</p><p class="text-2xl font-bold text-blue-600 mt-1" id="s-used">—</p></div>
    </div>
    <!-- Table -->
    <div id="loading" class="text-center py-12 text-slate-400 hidden">
      <svg class="animate-spin h-8 w-8 mx-auto text-emerald-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
      <p class="mt-2 text-sm">Đang tải dữ liệu...</p>
    </div>
    <div id="empty" class="text-center py-12 text-slate-400 hidden">
      <p class="text-lg">🏷 Không tìm thấy mã nào</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Mã code</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Loại dịch vụ</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Giá trị</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Đã dùng / Giới hạn</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Hết hạn</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Trạng thái</th>
            <th class="text-right px-5 py-3.5 font-semibold text-slate-600">Thao tác</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal Tạo / Sửa -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
    <div class="flex items-center justify-between mb-5">
      <h2 class="font-bold text-lg" id="modal-title">＋ Tạo mã giảm giá mới</h2>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button>
    </div>
    <form id="promo-form" onsubmit="savePromo(event)" class="space-y-4">
      <input type="hidden" id="edit-id"/>
      <div>
        <label class="text-xs font-semibold text-slate-500 block mb-1">Mã code *</label>
        <input id="f-code" required placeholder="VD: SUMMER2024"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 uppercase"
          oninput="this.value=this.value.toUpperCase()"/>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-semibold text-slate-500 block mb-1">Loại dịch vụ</label>
          <select id="f-type" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            <option>Tất cả</option><option>Tour</option><option>Hotel</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 block mb-1">Loại giảm</label>
          <select id="f-isp" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            <option value="1">Phần trăm (%)</option>
            <option value="0">Số tiền cố định (₫)</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-semibold text-slate-500 block mb-1">Giá trị *</label>
          <input id="f-value" type="number" required min="1" placeholder="10"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 block mb-1">Giới hạn dùng</label>
          <input id="f-limit" type="number" min="0" placeholder="0 = không giới hạn"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
        </div>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500 block mb-1">Ngày hết hạn</label>
        <input id="f-expiry" type="date"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 py-2.5 text-sm bg-slate-100 hover:bg-slate-200 rounded-xl transition">Hủy</button>
        <button type="submit" id="btn-save" class="flex-1 py-2.5 text-sm bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-semibold transition">Lưu</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Xác nhận xóa -->
<div id="confirm-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
    <div class="text-5xl mb-4">🗑️</div>
    <h3 class="font-bold text-lg text-slate-800 mb-2">Xác nhận xóa</h3>
    <p class="text-slate-500 text-sm mb-6" id="confirm-msg">Bạn có chắc muốn xóa mã này?</p>
    <div class="flex gap-3 justify-center">
      <button onclick="closeConfirm()" class="px-5 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm transition">Hủy</button>
      <button id="confirm-btn" class="px-5 py-2 bg-red-500 hover:bg-red-600 text-white rounded-xl text-sm font-semibold transition">Xóa</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script>
injectAdminSidebar('discounts.html');
if (!requireAdmin()) {}
else {

function showApiBanner(msg) {
  const el = document.getElementById('api-banner');
  if (!el) return;
  if (!msg) { el.classList.add('hidden'); el.textContent = ''; return; }
  el.classList.remove('hidden');
  el.textContent = msg;
}
let allPromos = [], deleteId = null;

function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
  document.getElementById('empty').classList.toggle('hidden', true);
  document.getElementById('table').parentElement.classList.toggle('hidden', show);
}

function showEmpty() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('empty').classList.remove('hidden');
  document.getElementById('table').innerHTML = '';
}

let debounceTimer;
function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadPromos, 300);
}

async function loadPromos() {
  showLoading(true);
  try {
    const search = document.getElementById('search').value.trim();
    const status = document.getElementById('status').value;
    const params = {};
    if (search) params.search = search;
    if (status) params.status = status;

    const res = await Promos.list(params);
    if (res.success) {
      allPromos = extractApiList(res);
      if (allPromos.length === 0) {
        showApiBanner('Không có mã giảm giá nào. Đảm bảo đã chạy: php artisan migrate --seed');
      }
      renderStats();
      renderTable();
    } else {
      showApiBanner('Lỗi tải dữ liệu: ' + (res.message || ''));
      toast('Lỗi tải dữ liệu', 'error');
    }
  } catch (err) {
    const is401 = err && (err.status === 401 || String(err.message || '').toLowerCase().includes('unauthenticated'));
    showApiBanner(is401
      ? 'Phiên đăng nhập hết hạn. Đăng nhập lại admin.'
      : 'Không thể kết nối server. Bật backend: cd be → php artisan serve');
    toast('Không thể kết nối server', 'error');
    allPromos = [];
  } finally {
    showLoading(false);
  }
}

function renderStats() {
  document.getElementById('s-total').textContent = allPromos.length;
  document.getElementById('s-active').textContent = allPromos.filter(p => p.status === 'active').length;
  document.getElementById('s-used').textContent = allPromos.reduce((s, p) => s + (parseInt(p.used_count) || 0), 0);
}

function renderTable() {
  if (allPromos.length === 0) { showEmpty(); return; }
  document.getElementById('empty').classList.add('hidden');
  document.getElementById('table').parentElement.classList.remove('hidden');

  const html = allPromos.map(p => {
    const usedCount = parseInt(p.used_count) || 0;
    const limit = parseInt(p.use_limit) || 0;
    const pct = limit > 0 ? Math.min(100, Math.round(usedCount / limit * 100)) : 30;
    const expiry = p.expiry_date ? new Date(p.expiry_date).toLocaleDateString('vi-VN') : 'Không hết hạn';
    const valDisplay = p.value_display || (p.value_num + (p.is_percent ? '%' : '₫'));

    let statusBadge;
    if (p.status === 'active') {
      statusBadge = '<span class="badge badge-success">🟢 Hoạt động</span>';
    } else if (p.status === 'expired') {
      statusBadge = '<span class="badge bg-slate-100 text-slate-500">⏰ Hết hạn</span>';
    } else {
      statusBadge = '<span class="badge badge-error">🔴 Tắt</span>';
    }

    return `<tr class="border-b border-slate-100 hover:bg-slate-50 group">
      <td class="px-5 py-4"><span class="font-mono font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded-lg text-sm">${p.promo_code}</span></td>
      <td class="px-5 py-4 text-sm text-slate-500">${p.type || 'Tất cả'}</td>
      <td class="px-5 py-4 text-sm font-bold text-emerald-600">${valDisplay}</td>
      <td class="px-5 py-4 text-sm">
        <div class="flex items-center gap-2">
          <div class="flex-1 bg-slate-100 rounded-full h-1.5"><div class="bg-emerald-500 h-1.5 rounded-full" style="width:${pct}%"></div></div>
          <span class="text-xs text-slate-500">${usedCount}/${limit || '∞'}</span>
        </div>
      </td>
      <td class="px-5 py-4 text-sm text-slate-500">${expiry}</td>
      <td class="px-5 py-4">${statusBadge}</td>
      <td class="px-5 py-4 text-right">
        <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition">
          <button onclick="openEditModal(${p.id})" class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs font-semibold px-3 py-1.5 rounded-lg transition">✏️ Sửa</button>
          <button onclick="confirmDelete(${p.id}, '${p.promo_code}')" class="bg-red-50 hover:bg-red-100 text-red-500 text-xs font-semibold px-3 py-1.5 rounded-lg transition">🗑 Xóa</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('table').innerHTML = html;
}

function openCreateModal() {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('promo-form').reset();
  document.getElementById('edit-id').value = '';
  document.getElementById('modal-title').textContent = '＋ Tạo mã giảm giá mới';
}

function openEditModal(id) {
  const p = allPromos.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('edit-id').value = id;
  document.getElementById('modal-title').textContent = '✏️ Chỉnh sửa mã giảm giá';
  document.getElementById('f-code').value = p.promo_code || '';
  document.getElementById('f-type').value = p.type || 'Tất cả';
  document.getElementById('f-isp').value = p.is_percent ? '1' : '0';
  document.getElementById('f-value').value = p.value_num || '';
  document.getElementById('f-limit').value = p.use_limit || '';
  document.getElementById('f-expiry').value = p.expiry_date || '';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('promo-form').reset();
}

async function savePromo(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-save');
  showLoadingBtn(btn, true);

  const id = parseInt(document.getElementById('edit-id').value);
  const payload = {
    promo_code: document.getElementById('f-code').value.trim().toUpperCase(),
    type: document.getElementById('f-type').value,
    is_percent: document.getElementById('f-isp').value === '1',
    value_num: parseFloat(document.getElementById('f-value').value) || 0,
    use_limit: parseInt(document.getElementById('f-limit').value) || 0,
    expiry_date: document.getElementById('f-expiry').value || null,
    status: 'active',
  };

  try {
    let res;
    if (id) {
      res = await Promos.update(id, payload);
    } else {
      res = await Promos.create(payload);
    }
    if (res.success) {
      toast(id ? '✅ Cập nhật mã thành công!' : '✅ Tạo mã giảm giá thành công!');
      closeModal();
      loadPromos();
    } else {
      toast(res.message || 'Có lỗi xảy ra', 'error');
    }
  } catch (err) {
    toast('Không thể lưu. Kiểm tra kết nối server.', 'error');
  } finally {
    showLoadingBtn(btn, false);
  }
}

function confirmDelete(id, code) {
  deleteId = id;
  document.getElementById('confirm-msg').textContent = `Bạn có chắc muốn xóa mã "${code}"?`;
  document.getElementById('confirm-modal').classList.remove('hidden');
  document.getElementById('confirm-btn').onclick = doDelete;
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.add('hidden');
  deleteId = null;
}

async function doDelete() {
  const btn = document.getElementById('confirm-btn');
  showLoadingBtn(btn, true);
  try {
    const res = await Promos.remove(deleteId);
    if (res.success) {
      toast('🗑️ Đã xóa mã giảm giá!');
      closeConfirm();
      loadPromos();
    } else {
      toast(res.message || 'Xóa thất bại', 'error');
    }
  } catch (err) {
    toast('Không thể kết nối server', 'error');
  } finally {
    showLoadingBtn(btn, false);
  }
}

function showLoadingBtn(el, show) {
  if (show) {
    el.disabled = true;
    el._o = el.innerHTML;
    el.innerHTML = '<svg class="animate-spin h-4 w-4 mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>';
  } else {
    el.disabled = false;
    el.innerHTML = el._o;
  }
}

// Backdrop close
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('confirm-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });

loadPromos();
}
</script>
</body></html>
