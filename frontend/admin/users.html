<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quản lý Người dùng | TravelWise Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;}</style>
<style>
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-error{background:#fee2e2;color:#991b1b}
.badge-primary{background:#dbeafe;color:#1e40af}
</style>
</head>
<body class="bg-slate-100">
<div id="tw-sidebar"></div>
<div class="ml-64">
  <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-20">
    <h1 class="text-xl font-bold">👥 Quản lý Người dùng</h1>
    <p class="text-xs text-slate-500">Xem và khóa/mở tài khoản người dùng</p>
  </header>
  <main class="p-6">
    <div id="api-banner" class="hidden rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900 mb-4"></div>
    <!-- Stats -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="text-xs text-slate-500 font-medium">Tổng người dùng</p>
        <p class="text-2xl font-bold text-slate-800 mt-1" id="stat-total">—</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="text-xs text-slate-500 font-medium">Đang hoạt động</p>
        <p class="text-2xl font-bold text-emerald-600 mt-1" id="stat-active">—</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="text-xs text-slate-500 font-medium">Bị khóa</p>
        <p class="text-2xl font-bold text-red-500 mt-1" id="stat-blocked">—</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="text-xs text-slate-500 font-medium">Admin</p>
        <p class="text-2xl font-bold text-blue-600 mt-1" id="stat-admins">—</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 p-4 mb-4 flex gap-3">
      <input id="search" placeholder="🔍 Tìm tên, email..." oninput="debounceLoad()" class="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
      <select id="status" onchange="loadUsers()" class="border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        <option value="">Tất cả</option>
        <option value="active">🟢 Đang hoạt động</option>
        <option value="blocked">🔴 Bị khóa</option>
      </select>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">ID</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Người dùng</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Email</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Đặt chỗ</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Ngày tham gia</th>
            <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Trạng thái</th>
            <th class="text-right px-5 py-3.5 font-semibold text-slate-600">Thao tác</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
      <div id="loading" class="text-center py-12 text-slate-400 hidden">
        <svg class="animate-spin h-8 w-8 mx-auto text-emerald-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
        <p class="mt-2 text-sm">Đang tải dữ liệu...</p>
      </div>
      <div id="empty" class="text-center py-12 text-slate-400 hidden">
        <p class="text-lg">👥 Không tìm thấy người dùng</p>
        <p class="text-xs mt-1">Thử thay đổi bộ lọc</p>
      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script>
injectAdminSidebar('users.html');
if (!requireAdmin()) {}
else {

function showApiBanner(msg) {
  const el = document.getElementById('api-banner');
  if (!el) return;
  if (!msg) { el.classList.add('hidden'); el.textContent = ''; return; }
  el.classList.remove('hidden');
  el.textContent = msg;
}
let allUsers = [];

function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
  document.getElementById('empty').classList.toggle('hidden', true);
}

function showEmpty() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('empty').classList.remove('hidden');
  document.getElementById('table').innerHTML = '';
}

let debounceTimer;
function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadUsers, 300);
}

async function loadUsers() {
  showLoading(true);
  try {
    const search = document.getElementById('search').value.trim();
    const status = document.getElementById('status').value;
    const params = {};
    if (search) params.search = search;
    if (status) params.status = status;

    // Use the Users API from api.js
    const res = await request('GET', '/admin/users?' + new URLSearchParams(params), null, true);
    if (res.success) {
      allUsers = extractApiList(res);
      if (allUsers.length === 0) {
        showApiBanner('Không có người dùng nào. Đảm bảo đã chạy: php artisan migrate --seed');
      }
      renderStats();
      renderTable();
    } else {
      showApiBanner('Lỗi tải dữ liệu: ' + (res.message || ''));
      toast('Lỗi tải dữ liệu', 'error');
    }
  } catch (err) {
    const is401 = err && (err.status === 401 || String(err.message || '').toLowerCase().includes('unauthenticated'));
    showApiBanner(is401
      ? 'Phiên đăng nhập hết hạn. Đăng nhập lại admin.'
      : 'Không thể kết nối server. Bật backend: cd be → php artisan serve');
    toast('Không thể kết nối server', 'error');
    allUsers = [];
  } finally {
    showLoading(false);
  }
}

function renderStats() {
  document.getElementById('stat-total').textContent = allUsers.length;
  document.getElementById('stat-active').textContent = allUsers.filter(u => u.status === 'active').length;
  document.getElementById('stat-blocked').textContent = allUsers.filter(u => u.status === 'blocked').length;
  document.getElementById('stat-admins').textContent = allUsers.filter(u => u.role === 'admin').length;
}

function renderTable() {
  if (allUsers.length === 0) { showEmpty(); return; }
  document.getElementById('empty').classList.add('hidden');

  const currentUserId = getUser()?.id;

  const html = allUsers.map(u => {
    const createdAt = u.created_at
      ? new Date(u.created_at).toLocaleDateString('vi-VN')
      : '—';
    const isSelf = u.id === currentUserId;
    const roleBadge = u.role === 'admin'
      ? '<span class="text-xs bg-orange-100 text-orange-600 font-semibold px-2 py-0.5 rounded">Admin</span>'
      : '<span class="text-xs bg-slate-100 text-slate-600 font-semibold px-2 py-0.5 rounded">Client</span>';
    const statusBadge = u.status === 'active'
      ? '<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700">🟢 Hoạt động</span>'
      : '<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-red-100 text-red-600">🔴 Bị khóa</span>';

    return `<tr class="border-b border-slate-100 hover:bg-slate-50 group">
      <td class="px-5 py-4 font-mono text-xs text-slate-400">${u.code || 'USR-' + u.id}</td>
      <td class="px-5 py-4">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-emerald-100 rounded-full flex items-center justify-center text-sm font-bold text-emerald-700">${(u.name || 'A').charAt(0).toUpperCase()}</div>
          <div>
            <span class="font-medium text-sm">${u.name || 'N/A'}</span>
            <div>${roleBadge}</div>
          </div>
        </div>
      </td>
      <td class="px-5 py-4 text-sm text-slate-500">${u.email || '—'}</td>
      <td class="px-5 py-4 text-center font-semibold text-slate-800">${u.booking_count || 0}</td>
      <td class="px-5 py-4 text-sm text-slate-500">${createdAt}</td>
      <td class="px-5 py-4">${statusBadge}</td>
      <td class="px-5 py-4 text-right">
        ${isSelf
          ? '<span class="text-xs text-slate-400 italic">Bạn</span>'
          : `<button onclick="toggleUser(${u.id}, '${u.status}')" class="text-xs ${u.status === 'active' ? 'bg-red-50 text-red-500 hover:bg-red-100' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'} font-semibold px-3 py-1.5 rounded-lg transition">
              ${u.status === 'active' ? '🔒 Khóa' : '🔓 Mở khóa'}
            </button>`
        }
      </td>
    </tr>`;
  }).join('');
  document.getElementById('table').innerHTML = html;
}

async function toggleUser(id, currentStatus) {
  const action = currentStatus === 'active' ? 'khóa' : 'mở khóa';
  if (!confirm(`Bạn có chắc muốn ${action} tài khoản này?`)) return;

  try {
    const res = await request('PATCH', `/admin/users/${id}/toggle-status`, null, true);
    if (res.success) {
      toast(`✅ ${res.message}`);
      loadUsers();
    } else {
      toast(res.message || 'Thao tác thất bại', 'error');
    }
  } catch (err) {
    toast('Không thể kết nối server', 'error');
  }
}

loadUsers();
}
</script>
</body></html>
