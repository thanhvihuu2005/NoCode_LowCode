<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Danh sách yêu thích | TravelWise</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;}</style>
</head><body class="bg-slate-50">
<div id="tw-navbar"></div>
<div class="max-w-5xl mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold mb-2">❤️ Danh sách yêu thích</h1>
  <p class="text-slate-500 text-sm mb-6">Tour và khách sạn bạn đã lưu</p>
  <div class="flex gap-2 mb-6">
    <button onclick="setTab('all')"   class="tab px-4 py-2 text-sm font-medium rounded-xl bg-emerald-600 text-white">Tất cả</button>
    <button onclick="setTab('hotel')" class="tab px-4 py-2 text-sm font-medium rounded-xl bg-white border border-slate-200 text-slate-600">🏨 Khách sạn</button>
    <button onclick="setTab('tour')"  class="tab px-4 py-2 text-sm font-medium rounded-xl bg-white border border-slate-200 text-slate-600">🗺 Tour</button>
  </div>
  <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
  <div id="empty" class="hidden text-center py-20 text-slate-400"><div class="text-5xl mb-3">❤️</div><p class="font-medium">Chưa có gì trong yêu thích</p><a href="hotels.html" class="mt-3 inline-block text-emerald-600 text-sm hover:underline">Khám phá ngay →</a></div>
</div>
<div id="tw-footer"></div>
<script src="../js/components.js"></script>
<script>
injectNavbar(); injectFooter();
// Mock saved: a few items
const saved=[
  {type:'hotel',id:1},{type:'hotel',id:5},{type:'tour',id:1},{type:'tour',id:4}
];
let tab='all';
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>{b.classList.remove('bg-emerald-600','text-white');b.classList.add('bg-white','border','border-slate-200','text-slate-600');});
  event.target.classList.add('bg-emerald-600','text-white');event.target.classList.remove('bg-white','border','border-slate-200','text-slate-600');
  render();
}
function render(){
  let items=saved.filter(s=>tab==='all'||s.type===tab);
  const cards=items.map(s=>{
    if(s.type==='hotel'){const h=DATA.hotels.find(x=>x.id===s.id);return h?hotelCard(h):''}
    const t=DATA.tours.find(x=>x.id===s.id);return t?tourCard(t):'';
  }).filter(Boolean);
  document.getElementById('empty').classList.toggle('hidden',cards.length>0);
  document.getElementById('grid').innerHTML=cards.join('');
}
render();
</script>
</body></html>
