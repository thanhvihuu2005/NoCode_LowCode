<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đặt dịch vụ | TravelWise</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;}</style>
</head><body class="bg-slate-50">
<div id="tw-navbar"></div>
<div class="max-w-4xl mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold mb-6">📋 Xác nhận đặt dịch vụ</h1>
  <div class="grid md:grid-cols-3 gap-6">
    <div class="md:col-span-2 space-y-4">
      <!-- Thông tin liên lạc -->
      <div class="bg-white rounded-2xl p-6 border border-slate-200">
        <h2 class="font-bold text-lg mb-4">👤 Thông tin liên lạc</h2>
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2"><label class="text-xs font-semibold text-slate-500 block mb-1">Họ tên *</label>
            <input id="f-name" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400" placeholder="Nguyễn Văn A"/></div>
          <div><label class="text-xs font-semibold text-slate-500 block mb-1">Email *</label>
            <input id="f-email" type="email" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400" placeholder="email@gmail.com"/></div>
          <div><label class="text-xs font-semibold text-slate-500 block mb-1">Điện thoại</label>
            <input id="f-phone" type="tel" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400" placeholder="0901 234 567"/></div>
          <div><label class="text-xs font-semibold text-slate-500 block mb-1">Số lượng khách</label>
            <input id="f-guests" type="number" min="1" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400" value="1" onchange="updateGuests(this.value)"/></div>
          <div class="col-span-2"><label class="text-xs font-semibold text-slate-500 block mb-1">Ghi chú</label>
            <textarea id="f-note" rows="2" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 resize-none" placeholder="Yêu cầu đặc biệt..."></textarea></div>
        </div>
      </div>
      <!-- Add-ons -->
      <div class="bg-white rounded-2xl p-6 border border-slate-200">
        <h2 class="font-bold text-lg mb-4">🎁 Dịch vụ thêm</h2>
        <div class="space-y-3" id="addons"></div>
      </div>
      <!-- Mã giảm giá -->
      <div class="bg-white rounded-2xl p-6 border border-slate-200">
        <h2 class="font-bold text-lg mb-4">🏷 Mã giảm giá</h2>
        <div class="flex gap-2">
          <input id="promo" placeholder="Nhập mã..." class="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
          <button onclick="applyPromo()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-4 rounded-xl transition text-sm">Áp dụng</button>
        </div>
        <div id="promo-msg" class="hidden mt-2 text-sm"></div>
      </div>
      <!-- Phương thức thanh toán -->
      <div class="bg-white rounded-2xl p-6 border border-slate-200">
        <h2 class="font-bold text-lg mb-4">💳 Phương thức thanh toán</h2>
        <div class="space-y-3">
          <label class="flex items-center p-3 border border-slate-200 rounded-xl cursor-pointer hover:border-emerald-400 transition has-[:checked]:border-emerald-400 has-[:checked]:bg-emerald-50">
            <input type="radio" name="payment" value="credit_card" class="rounded-full text-emerald-600 focus:ring-emerald-500 mr-3" checked onchange="updatePayment(this.value)">
            <div class="flex-1">
              <p class="text-sm font-medium text-slate-800">Thẻ tín dụng / Ghi nợ</p>
              <p class="text-xs text-slate-500">Visa, Mastercard, JCB</p>
            </div>
            <span class="text-xl">💳</span>
          </label>
          <label class="flex items-center p-3 border border-slate-200 rounded-xl cursor-pointer hover:border-emerald-400 transition has-[:checked]:border-emerald-400 has-[:checked]:bg-emerald-50">
            <input type="radio" name="payment" value="momo" class="rounded-full text-emerald-600 focus:ring-emerald-500 mr-3" onchange="updatePayment(this.value)">
            <div class="flex-1">
              <p class="text-sm font-medium text-slate-800">Ví MoMo</p>
              <p class="text-xs text-slate-500">Thanh toán qua ứng dụng MoMo</p>
            </div>
            <span class="text-xl">📱</span>
          </label>
          <label class="flex items-center p-3 border border-slate-200 rounded-xl cursor-pointer hover:border-emerald-400 transition has-[:checked]:border-emerald-400 has-[:checked]:bg-emerald-50">
            <input type="radio" name="payment" value="bank_transfer" class="rounded-full text-emerald-600 focus:ring-emerald-500 mr-3" onchange="updatePayment(this.value)">
            <div class="flex-1">
              <p class="text-sm font-medium text-slate-800">Chuyển khoản trực tiếp</p>
              <p class="text-xs text-slate-500">Chuyển khoản qua Internet Banking / QR Code</p>
            </div>
            <span class="text-xl">🏦</span>
          </label>
        </div>
      </div>
    </div>
    <!-- Order summary -->
    <div class="md:col-span-1">
      <div class="bg-white rounded-2xl p-6 border border-slate-200 sticky top-20" id="summary"></div>
    </div>
  </div>
</div>
<div id="tw-footer"></div>
<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script>
injectNavbar(); injectFooter();
if(!getToken()){location.href='login.html';}
const u=getUser();
if(u){document.getElementById('f-name').value=u.name;document.getElementById('f-email').value=u.email;}

const draft=JSON.parse(localStorage.getItem('tw_booking_draft')||'{"type":"hotel","id":1,"name":"An Home","price":350000}');
if(!draft.guests) draft.guests = 1;
if(!draft.payment) draft.payment = 'credit_card';
if(document.getElementById('f-guests')) document.getElementById('f-guests').value = draft.guests;

function fmtVND(p) {
  if (isNaN(p) || p == null) return '0₫';
  return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 }).format(p);
}

function updateGuests(num) {
  draft.guests = parseInt(num) || 1;
  renderSummary();
}

function updatePayment(val) {
  draft.payment = val;
}

let discount=0;
// Giá addon tính bằng VND
const ADDONS=[
  {id:'ADD-01',name:'Bảo hiểm du lịch',price:100000},
  {id:'ADD-02',name:'Xe đưa đón sân bay',price:350000},
  {id:'ADD-03',name:'SIM 4G',price:50000},
];
const selected=new Set();

document.getElementById('addons').innerHTML=ADDONS.map(a=>`
  <label class="flex items-center justify-between p-3 border border-slate-200 rounded-xl cursor-pointer hover:border-emerald-400 transition has-[:checked]:border-emerald-400 has-[:checked]:bg-emerald-50">
    <div class="flex items-center gap-3">
      <input type="checkbox" value="${a.id}" onchange="toggleAddon('${a.id}',${a.price})" class="rounded"/>
      <div><p class="text-sm font-medium text-slate-800">${a.name}</p></div>
    </div>
    <span class="text-sm font-semibold text-emerald-600">+${fmtVND(a.price)}</span>
  </label>`).join('');

function toggleAddon(id,price){
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  renderSummary();
}

async function applyPromo(){
  const code=document.getElementById('promo').value.trim().toUpperCase();
  const el=document.getElementById('promo-msg');
  el.classList.remove('hidden');
  try {
    const res = await Promos.list({ code });
    const promos = res.data || [];
    const p = promos.find(x => x.promo_code === code && x.status === 'active');
    if (!p) {
      el.className='text-sm mt-2 text-red-600';
      el.textContent='Mã không hợp lệ hoặc đã hết hạn!';
      return;
    }
    discount = p.is_percent
      ? Math.round(draft.price * p.value_num / 100)
      : p.value_num;
    el.className='text-sm mt-2 text-emerald-600';
    el.textContent=`Áp dụng thành công! Giảm ${fmtVND(discount)}`;
  } catch {
    el.className='text-sm mt-2 text-red-600';
    el.textContent='Không thể kiểm tra mã. Thử lại.';
  }
  renderSummary();
}

function fmtDateDMY(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit', year: 'numeric'});
}

function renderSummary() {
  const isHotel = draft.type === 'hotel';
  const isTour  = draft.type === 'tour';

  let addonTotal = [...selected].reduce((s,id)=>{const a=ADDONS.find(x=>x.id===id);return s+(a?a.price:0);},0);
  const total = Math.max(0, draft.price + addonTotal - discount);

  let datesHtml = '';
  if (isHotel) {
    datesHtml = `
      <div class="flex justify-between text-sm">
        <span class="text-slate-500">Nhận phòng</span>
        <span class="font-medium text-slate-700">${fmtDateDMY(draft.checkin)}</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-slate-500">Trả phòng</span>
        <span class="font-medium text-slate-700">${fmtDateDMY(draft.checkout)}</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-slate-500">Số đêm</span>
        <span class="font-semibold text-blue-600">${draft.nights || 0} đêm</span>
      </div>`;
  } else if (isTour) {
    datesHtml = `
      <div class="flex justify-between text-sm">
        <span class="text-slate-500">Khởi hành</span>
        <span class="font-medium text-slate-700">${fmtDateDMY(draft.departure)}</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-slate-500">Kết thúc</span>
        <span class="font-medium text-slate-700">${fmtDateDMY(draft.returnDate)}</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-slate-500">Lịch trình</span>
        <span class="font-semibold text-blue-600">${draft.duration || '—'}</span>
      </div>`;
  }

  document.getElementById('summary').innerHTML = `
    <h3 class="font-bold mb-4">🧾 Tóm tắt đơn hàng</h3>
    ${draft.img ? `<img src="${draft.img}" class="w-full h-32 object-cover rounded-xl mb-3"/>` : ''}
    <p class="font-semibold text-slate-800 text-sm mb-1">${draft.name}</p>
    <p class="text-xs text-slate-500 mb-3">📍 ${draft.location || ''}</p>
    <div class="space-y-1.5 text-sm border-t border-slate-100 pt-3">
      ${datesHtml}
      <div class="flex justify-between text-sm">
        <span class="text-slate-500">Số khách</span>
        <span class="font-semibold text-slate-700">${draft.guests || 1} người</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-slate-500">${isHotel ? 'Đơn giá/đêm' : 'Đơn giá/người'}</span>
        <span class="font-medium text-slate-700">${draft.unitPrice ? fmtVND(draft.unitPrice) : fmtVND(draft.price / (draft.guests || 1) / (draft.nights || 1))}</span>
      </div>
      ${addonTotal ? `<div class="flex justify-between"><span class="text-slate-500">Dịch vụ thêm</span><span class="text-emerald-600">+${fmtVND(addonTotal)}</span></div>` : ''}
      ${discount ? `<div class="flex justify-between text-emerald-600"><span>Giảm giá</span><span>-${fmtVND(discount)}</span></div>` : ''}
      <div class="flex justify-between font-bold text-base border-t border-slate-200 pt-2 mt-2">
        <span>Tổng cộng</span>
        <span class="text-emerald-600">${fmtVND(total)}</span>
      </div>
    </div>
    <button onclick="confirmBooking(${total})" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition text-sm">Xác nhận đặt</button>
    <p class="text-xs text-slate-400 text-center mt-2">Thanh toán an toàn 🔒</p>`;
}

async function confirmBooking(total) {
  const btn = document.querySelector('button[onclick^="confirmBooking"]');
  if (btn) showLoading(btn, true);

  const paymentMethod = draft.payment || 'credit_card';
  const bookingData = {
    service_type: draft.type, // 'tour' or 'hotel'
    service_id: draft.id,
    service_name: draft.name,
    guests: draft.guests || 1,
    total_price: total,
    check_in_date: draft.type === 'hotel' ? draft.checkin : draft.departure,
    check_out_date: draft.type === 'hotel' ? draft.checkout : draft.returnDate,
    discount_code: document.getElementById('promo')?.value || null,
    note: document.getElementById('f-note')?.value || '',
    payment_method: paymentMethod // Backend ignores this for now based on schema but good for payload
  };

  try {
    const res = await Bookings.create(bookingData);
    if (!res.success) throw new Error(res.message || 'Lỗi khi đặt dịch vụ');

    // Also update local storage for the confirmation page to show details immediately
    localStorage.setItem('tw_last_booking', JSON.stringify(res.data));
    localStorage.removeItem('tw_booking_draft');

    showToast('Đặt dịch vụ thành công!');
    setTimeout(() => {
      location.href = 'booking-confirmed.html';
    }, 1500);
  } catch (err) {
    console.error(err);
    showToast(err.message || 'Không thể kết nối đến máy chủ', 'error');
    if (btn) showLoading(btn, false);
  }
}

renderSummary();
</script>
</body></html>
