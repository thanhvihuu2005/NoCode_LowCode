<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trang cá nhân | TravelWise</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;}</style>
</head><body class="bg-slate-50">
<div id="tw-navbar"></div>
<div class="max-w-3xl mx-auto px-4 py-10">
  <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden mb-6">
    <div class="bg-gradient-to-r from-emerald-600 to-teal-600 h-28"></div>
    <div class="px-6 pb-6">
      <div class="flex items-end justify-between -mt-10 mb-4">
        <div class="w-20 h-20 bg-white rounded-full border-4 border-white shadow-lg flex items-center justify-center text-3xl" id="avatar">👤</div>
        <button onclick="document.getElementById('edit-modal').classList.remove('hidden')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-xl transition">✏️ Chỉnh sửa</button>
      </div>
      <h1 class="text-2xl font-bold text-slate-800" id="prof-name">—</h1>
      <p class="text-slate-500 text-sm" id="prof-email">—</p>
      <div class="flex gap-4 mt-4">
        <div class="text-center"><p class="text-2xl font-bold text-slate-800" id="prof-bookings">—</p><p class="text-xs text-slate-500">Đặt chỗ</p></div>
        <div class="text-center"><p class="text-2xl font-bold text-slate-800">0</p><p class="text-xs text-slate-500">Đánh giá</p></div>
        <div class="text-center"><p class="text-2xl font-bold text-slate-800">0</p><p class="text-xs text-slate-500">Yêu thích</p></div>
      </div>
    </div>
  </div>
  <div class="grid grid-cols-2 gap-4 mb-6">
    <a href="booking-history.html" class="bg-white rounded-2xl p-5 border border-slate-200 hover:border-emerald-400 transition text-center group">
      <div class="text-3xl mb-2">📋</div><p class="font-semibold text-slate-800">Lịch sử đặt chỗ</p><p class="text-xs text-slate-500 mt-1">Xem tất cả đơn hàng</p>
    </a>
    <a href="wishlist.html" class="bg-white rounded-2xl p-5 border border-slate-200 hover:border-emerald-400 transition text-center group">
      <div class="text-3xl mb-2">❤️</div><p class="font-semibold text-slate-800">Danh sách yêu thích</p><p class="text-xs text-slate-500 mt-1">Tour & khách sạn lưu</p>
    </a>
  </div>
  <div class="bg-white rounded-2xl border border-slate-200 p-6">
    <h2 class="font-bold mb-4">🔒 Đổi mật khẩu</h2>
    <div class="space-y-3">
      <input type="password" placeholder="Mật khẩu hiện tại" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
      <input type="password" placeholder="Mật khẩu mới" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
      <input type="password" placeholder="Xác nhận mật khẩu mới" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
      <button onclick="showToast('✅ Đổi mật khẩu thành công!')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2.5 rounded-xl transition text-sm">Cập nhật mật khẩu</button>
    </div>
  </div>
  <div class="mt-4 text-center">
    <button onclick="handleLogout()" class="text-sm text-red-500 hover:text-red-700 font-medium transition">🚪 Đăng xuất</button>
  </div>
</div>

<!-- Edit modal -->
<div id="edit-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
    <h3 class="font-bold text-lg mb-4">✏️ Chỉnh sửa hồ sơ</h3>
    <div class="space-y-3">
      <div><label class="text-xs font-semibold text-slate-500 block mb-1">Họ tên</label>
        <input id="edit-name" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/></div>
      <div><label class="text-xs font-semibold text-slate-500 block mb-1">Số điện thoại</label>
        <input id="edit-phone" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/></div>
    </div>
    <div class="flex gap-3 mt-5">
      <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 py-2.5 text-sm bg-slate-100 rounded-xl">Hủy</button>
      <button onclick="saveProfile()" class="flex-1 py-2.5 text-sm bg-emerald-600 text-white rounded-xl font-semibold">Lưu</button>
    </div>
  </div>
</div>

<div id="tw-footer"></div>
<script src="../js/components.js"></script>
<script>
injectNavbar(); injectFooter();
if(!getToken()) location.href='login.html';
const u=getUser();
if(u){
  document.getElementById('prof-name').textContent=u.name;
  document.getElementById('prof-email').textContent=u.email;
  document.getElementById('avatar').textContent=u.name.charAt(0);
  document.getElementById('prof-bookings').textContent=DATA.bookings.filter(b=>b.userId===u.id).length||'0';
  document.getElementById('edit-name').value=u.name;
}
function saveProfile(){
  const u2={...getUser(),name:document.getElementById('edit-name').value};
  localStorage.setItem('tw_user',JSON.stringify(u2));
  document.getElementById('prof-name').textContent=u2.name;
  document.getElementById('edit-modal').classList.add('hidden');
  showToast('✅ Đã cập nhật hồ sơ!');
}
function handleLogout(){removeAuth();location.href='login.html';}
</script>
</body></html>
