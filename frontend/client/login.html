<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | TravelWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
    <style>
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a5f);min-height:100vh;}
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-extrabold text-white">✈️ TravelWise</a>
            <p class="text-slate-400 mt-2 text-sm">Chào mừng trở lại!</p>
        </div>
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <h1 class="text-2xl font-bold text-slate-800 mb-6">Đăng nhập</h1>
            <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 mb-4"></div>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input id="email" type="email" required placeholder="admin@travelwise.vn"
                        class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
                    <div class="relative">
                        <input id="password" type="password" required placeholder="••••••••"
                            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 pr-10"/>
                        <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">👁</button>
                    </div>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-600">
                        <input type="checkbox" class="rounded"/> Nhớ tôi
                    </label>
                    <a href="#" class="text-emerald-600 hover:underline">Quên mật khẩu?</a>
                </div>
                <button id="submit-btn" type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition text-sm">
                    Đăng nhập
                </button>
            </form>
            <p class="text-center text-sm text-slate-500 mt-6">
                Chưa có tài khoản? 
                <a href="register.html" class="text-emerald-600 font-semibold hover:underline">Đăng ký ngay</a>
            </p>

      
        </div>
    </div>

    <script src="../js/components.js"></script>
    <script src="../js/auth-api.js"></script>
    <script>
        function togglePwd() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function fillDemo(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }

        function showLoading(btn, show) {
            if (show) {
                btn.disabled = true;
                btn._orig = btn.innerHTML;
                btn.innerHTML = '<svg class="animate-spin h-4 w-4 mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn._orig;
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            const bg = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            toast.className = `fixed top-4 right-4 z-[9999] px-5 py-3 rounded-xl text-white text-sm font-medium shadow-xl ${bg} transition-all duration-300 translate-x-[120%]`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-[120%]'));
            setTimeout(() => {
                toast.classList.add('translate-x-[120%]');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            errEl.classList.add('hidden');
            showLoading(btn, true);
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                // Call real API using auth-api.js
                const response = await loginUser(email, password);
                
                if (response.success) {
                    showToast('✅ Đăng nhập thành công!');
                    
                    // Redirect based on role
                    const user = response.data.user;
                    setTimeout(() => {
                        if (user.role === 'admin') {
                            window.location.href = '../admin/index.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 800);
                } else {
                    throw new Error(response.message || 'Đăng nhập thất bại');
                }
            } catch (error) {
                console.error('Login error:', error);
                errEl.textContent = error.message || 'Email hoặc mật khẩu không đúng!';
                errEl.classList.remove('hidden');
                showLoading(btn, false);
            }
        }
    </script>
</body>
</html>
