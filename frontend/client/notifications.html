<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thông báo | TravelWise</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;}</style>
</head><body class="bg-slate-50">
<div id="tw-navbar"></div>
<div class="max-w-2xl mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">🔔 Thông báo</h1>
    <button onclick="markAll()" class="text-sm text-emerald-600 hover:underline">Đánh dấu đã đọc tất cả</button>
  </div>
  <div id="notif-list" class="space-y-3"></div>
</div>
<div id="tw-footer"></div>
<script src="../js/components.js"></script>
<script>
injectNavbar(); injectFooter();
const NOTIFS=[
  {id:1,type:'booking',title:'Đặt chỗ được xác nhận!',message:'Đơn BK-1002 — Sapa Misty Mountains đã được xác nhận.',time:'10 phút trước',read:false},
  {id:2,type:'promo',title:'Ưu đãi đặc biệt!',message:'Dùng mã WELCOMENEW giảm 100.000₫ cho lần đặt đầu tiên!',time:'1 giờ trước',read:false},
  {id:3,type:'system',title:'Hồ sơ được cập nhật',message:'Thông tin cá nhân của bạn đã được cập nhật thành công.',time:'2 ngày trước',read:true},
  {id:4,type:'booking',title:'Nhắc nhở chuyến đi',message:'Chuyến tour Sapa Misty Mountains sẽ khởi hành trong 3 ngày nữa.',time:'3 ngày trước',read:true},
];
const icons={booking:'📋',promo:'🎁',system:'⚙️'};
const colors={booking:'bg-blue-100 text-blue-600',promo:'bg-orange-100 text-orange-600',system:'bg-slate-100 text-slate-500'};
function render(){
  document.getElementById('notif-list').innerHTML=NOTIFS.map(n=>`
    <div class="bg-white rounded-2xl border ${n.read?'border-slate-200':'border-emerald-200'} p-5 flex gap-4 ${!n.read?'shadow-sm':''}">
      <div class="w-10 h-10 rounded-xl ${colors[n.type]} flex items-center justify-center text-xl flex-shrink-0">${icons[n.type]}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <p class="font-semibold text-slate-800 text-sm ${!n.read?'':'text-slate-600'}">${n.title}</p>
          ${!n.read?'<span class="w-2 h-2 bg-emerald-500 rounded-full mt-1.5 flex-shrink-0"></span>':''}
        </div>
        <p class="text-sm text-slate-500 mt-1">${n.message}</p>
        <p class="text-xs text-slate-400 mt-2">${n.time}</p>
      </div>
    </div>`).join('');
}
function markAll(){NOTIFS.forEach(n=>n.read=true);render();showToast('✅ Đã đánh dấu tất cả đã đọc!');}
render();
</script>
</body></html>
